<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wedding Run - Рекорды и Исправленный Рестарт</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-image: url('https://i.ibb.co/R40qMKdn/bride-png.jpg'); 
            background-size: 100% 100%; background-repeat: no-repeat;
            background-attachment: fixed; background-position: center;
            background-color: #87CEEB; font-family: sans-serif;
        }
        canvas { display: block; }
        #ui { 
            position: fixed; top: 20px; left: 20px; color: white; 
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10;
        }
        #start { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    Монеты: <span id="c">0</span> | 
    Дистанция: <span id="d">0</span> м | 
    Рекорд: <span id="hs">0</span> м
</div>

<div id="start">
    <h1 style="color: #ff69b4; font-size: 40px; margin: 0;">👰 СВАДЕБНЫЙ ЗАБЕГ</h1>
    <p>Нажми СЮДА или ПРОБЕЛ для старта</p>
</div>

<canvas id="g"></canvas>

<script>
(function() {
    const canvas = document.getElementById("g");
    const ctx = canvas.getContext("2d");
    const startDiv = document.getElementById("start");
    
    let active = false;
    let over = false;
    let coins = 0;
    let dist = 0;
    let ground, speed = 7;
    let obs = [], cl = [];

    // Загрузка рекорда
    let highscore = 0;
    try {
        highscore = localStorage.getItem("wedding_run_hs") || 0;
    } catch (e) { console.warn("LocalStorage недоступен"); }

    const obstacleImg = new Image();
    obstacleImg.src = 'https://i.ibb.co/9kS7m9yD/bc36vHv.png'; 

    const p = { x: 80, y: 0, w: 50, h: 70, dy: 0, canJump: false };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ground = canvas.height - 60;
        if (!active) p.y = ground - p.h;
    }

    function startGame() {
        if (!active) {
            active = true;
            startDiv.style.display = "none";
            loop();
        } else if (over) {
            location.reload(); // Перезапуск при проигрыше
        }
    }

    // Обработка ввода (Мышь и Пробел)
    window.addEventListener("mousedown", (e) => {
