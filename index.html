<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring in Mountains</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            /* Критично для мобильных: отключает скролл и жесты браузера */
            touch-action: none; 
            background-image: url('background.jpg'); 
            background-size: 100% 100%; 
            background-position: center; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
            background: transparent; 
        }
        #ui { 
            position: fixed; top: 10px; left: 10px; color: white; 
            font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10;
        }
        #start { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<div id="ui">
    Монеты: <span id="c">0</span> | 
    Дистанция: <span id="d">0</span> м | 
    Рекорд: <span id="hs">0</span> м
</div>

<div id="start">
    <h1 style="color: #ff69b4; font-size: 32px; margin: 0;">⛰️ Весна в горах</h1>
    <p>Нажми на экран или ПРОБЕЛ для старта</p>
</div>

<canvas id="g"></canvas>

<script>
(function() {
    const canvas = document.getElementById("g");
    const ctx = canvas.getContext("2d");
    const startDiv = document.getElementById("start");
    
    let active = false;
    let over = false;
    let coins = 0;
    let dist = 0;
    let ground, speed = 7;
    let obs = [], cl = [];

    let highscore = 0;
    try {
        highscore = localStorage.getItem("wedding_run_hs") || 0;
    } catch (e) {}

    // Загрузка ресурсов
    const cyclistImg = new Image();
    cyclistImg.src = 'jumpover.png'; 

    const coinImg = new Image();
    coinImg.src = 'coin.png'; 

    const p = { x: 50, y: 0, w: 60, h: 60, dy: 0, canJump: false };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ground = canvas.height - 60;
        if (!active) p.y = ground - p.h;
        
        if(window.innerWidth < 600) {
            p.w = 55; p.h = 55;
        }
    }

    // Обработка прыжка и старта
    function handleAction(e) {
        // Запрещаем стандартные действия браузера (важно для iOS)
        if (e.cancelable) e.preventDefault();

        if (e.type === "keydown" && e.code !== "Space") return;

        if (!active) {
            active = true;
            startDiv.style.display = "none";
            loop();
        } else if (over) {
            window.location.reload();
        } else if (p.canJump) {
            p.dy = -17; 
            p.canJump = false;
        }
    }

    // pointerdown работает и для тапа, и для клика мыши
    window.addEventListener("pointerdown", handleAction, { passive: false });
    window.addEventListener("keydown", handleAction);
    window.addEventListener("resize", resize);
    
    resize();

    setInterval(() => {
        if (!active || over) return;
        obs.push({ x: canvas.width, w: 45, h: 45 });
        if (Math.random() > 0.5) cl.push({ x: canvas.width + 100, y: ground - 110, r: 18 });
    }, 1400);

    function loop() {
        if (!active) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Линия земли
        ctx.fillStyle = "rgba(255, 105, 180, 0.6)";
        ctx.fillRect(0, ground, canvas.width, 8);

        if (!over) {
            p.dy += 0.85;
            p.y += p.dy;
            if (p.y > ground - p.h) {
                p.y = ground - p.h;
                p.dy = 0;
                p.canJump = true;
            }
            dist += speed * 0.012;
            speed += 0.0015;
        }

        // Отрисовка игрока (Велосипедист)
        if (cyclistImg.complete && cyclistImg.naturalWidth !== 0) {
            ctx.drawImage(cyclistImg, p.x, p.y, p.w, p.h);
        } else {
            ctx.fillStyle = "#ffdd00";
            ctx.fillRect(p.x, p.y, p.w, p.h);
        }

        // Отрисовка препятствий (Голубые квадраты)
        ctx.fillStyle = "#00BFFF";
        obs.forEach((o, i) => {
            if (!over) o.x -= speed;
            ctx.fillRect(o.x, ground - o.h, o.w, o.h);
            
            // Столкновение
            if (p.x < o.x + o.w && p.x + p.w > o.x && p.y + p.h > ground - o.h) {
                over = true;
            }
        });

        // Отрисовка монет
        cl.forEach((c, i) => {
            if (!over) c.x -= speed;
            if (coinImg.complete && coinImg.naturalWidth !== 0) {
                ctx.drawImage(coinImg, c.x - c.r, c.y - c.r, c.r*2, c.r*2);
            } else {
                ctx.fillStyle = "#FFD700";
                ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
            }
            
            let dx = (p.x + p.w/2) - c.x;
            let dy = (p.y + p.h/2) - c.y;
            if (!over && Math.sqrt(dx*dx + dy*dy) < 45) {
                coins++;
                cl.splice(i, 1);
            }
        });

        document.getElementById("c").innerText = coins;
        document.getElementById("d").innerText = Math.floor(dist);
        document.getElementById("hs").innerText = Math.floor(highscore);

        if (over) {
            if (dist > highscore) {
                highscore = dist;
                try { localStorage.setItem("wedding_run_hs", highscore); } catch (e) {}
            }
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 26px Arial";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "20px Arial";
            ctx.fillText("Дистанция: " + Math.floor(dist) + " м", canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillStyle = "#ff69b4";
            ctx.fillText("Тапни для рестарта", canvas.width / 2, canvas.height / 2 + 70);
        }
        requestAnimationFrame(loop);
    }
})();
</script>
</body>
</html>
