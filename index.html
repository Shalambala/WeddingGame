<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wedding Run - Custom Assets Edition</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            /* Локальный фон на весь экран */
            background-image: url('background.jpg'); 
            background-size: 100% 100%; 
            background-position: center; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #87CEEB; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
            background: transparent; 
        }
        #ui { 
            position: fixed; top: 20px; left: 20px; color: white; 
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10;
        }
        #start { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    Монеты: <span id="c">0</span> | 
    Дистанция: <span id="d">0</span> м | 
    Рекорд: <span id="hs">0</span> м
</div>

<div id="start">
    <h1 style="color: #ff69b4; font-size: 40px; margin: 0;">⛰️ Весна в горах</h1>
    <p>Нажми СЮДА или ПРОБЕЛ для старта</p>
</div>

<canvas id="g"></canvas>

<script>
(function() {
    const canvas = document.getElementById("g");
    const ctx = canvas.getContext("2d");
    const startDiv = document.getElementById("start");
    
    let active = false;
    let over = false;
    let coins = 0;
    let dist = 0;
    let ground, speed = 7;
    let obs = [], cl = [];

    let highscore = 0;
    try {
        highscore = localStorage.getItem("wedding_run_hs") || 0;
    } catch (e) {}

    // --- 1. ЗАГРУЗКА ЛОКАЛЬНЫХ КАРТИНОК ---
    
    // Велосипедист (Персонаж)
    const cyclistImg = new Image();
    cyclistImg.src = 'jumpover.png'; 

    // ВАША КАРТИНКА МОНЕТКИ
    const coinImg = new Image();
    coinImg.src = 'coin.png'; // Убедитесь, что файл с таким именем лежит в папке!

    // Параметры персонажа
    const p = { x: 80, y: 0, w: 70, h: 70, dy: 0, canJump: false };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ground = canvas.height - 60;
        if (!active) p.y = ground - p.h;
    }

    function handleAction(e) {
        if (e.type === "keydown" && e.code !== "Space") return;
        if (e.type === "keydown") e.preventDefault();

        if (!active) {
            active = true;
            startDiv.style.display = "none";
            loop();
        } else if (over) {
            window.location.reload();
        } else if (p.canJump) {
            p.dy = -18;
            p.canJump = false;
        }
    }

    window.addEventListener("mousedown", handleAction);
    window.addEventListener("keydown", handleAction);
    window.addEventListener("resize", resize);
    resize();

    setInterval(() => {
        if (!active || over) return;
        // Препятствие
        obs.push({ x: canvas.width, w: 50, h: 50 });
        // Монета (теперь используем `r` для масштабирования картинки)
        if (Math.random() > 0.5) cl.push({ x: canvas.width + 100, y: ground - 120, r: 20 });
    }, 1500);

    function loop() {
        if (!active) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Пол
        ctx.fillStyle = "rgba(255, 105, 180, 0.7)";
        ctx.fillRect(0, ground, canvas.width, 10);

        if (!over) {
            p.dy += 0.8;
            p.y += p.dy;
            if (p.y > ground - p.h) {
                p.y = ground - p.h;
                p.dy = 0;
                p.canJump = true;
            }
            dist += speed * 0.01;
            speed += 0.001;
        }

        // Рисуем Велосипедиста (Персонаж)
        if (cyclistImg.complete && cyclistImg.naturalWidth !== 0) {
            ctx.drawImage(cyclistImg, p.x, p.y, p.w, p.h);
        } else {
            ctx.fillStyle = "yellow"; // Запасной вариант
            ctx.fillRect(p.x, p.y, p.w, p.h);
        }

        // Рисуем Голубые Квадраты (Препятствия)
        ctx.fillStyle = "#00BFFF";
        obs.forEach((o, i) => {
            if (!over) o.x -= speed;
            ctx.fillRect(o.x, ground - o.h, o.w, o.h);
            if (p.x < o.x + o.w && p.x + p.w > o.x && p.y + p.h > ground - o.h) {
                over = true;
            }
        });

        // --- 3. РИСУЕМ ВАШУ КАРТИНКУ МОНЕТКИ (coin.png) ---
        cl.forEach((c, i) => {
            if (!over) c.x -= speed;

            // Если картинка монетки загрузилась
            if (coinImg.complete && coinImg.naturalWidth !== 0) {
                // Картинка рисуется от центра, так же как раньше рисовался круг.
                // c.r * 2 — это будет ширина и высота картинки.
                const imgSize = c.r * 2;
                ctx.drawImage(coinImg, c.x - c.r, c.y - c.r, imgSize, imgSize);
            } else {
                // Запасной вариант (желтый круг), если картинка не найдена
                ctx.fillStyle = "#FFD700";
                ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill();
            }
            
            // Проверка сбора монетки
            let dx = (p.x + p.w/2) - c.x;
            let dy = (p.y + p.h/2) - c.y;
            // Условие коллизии осталось прежним, оно работает для центра монеты
            if (!over && Math.sqrt(dx*dx + dy*dy) < (p.w/2 + c.r)) {
                coins++;
                cl.splice(i, 1);
            }
        });

        document.getElementById("c").innerText = coins;
        document.getElementById("d").innerText = Math.floor(dist);
        document.getElementById("hs").innerText = Math.floor(highscore);

        if (over) {
            if (dist > highscore) {
                highscore = dist;
                try { localStorage.setItem("wedding_run_hs", highscore); } catch (e) {}
            }
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 30px Arial";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = "24px Arial";
            ctx.fillText("Результат: " + Math.floor(dist) + " м", canvas.width / 2, canvas.height / 2 + 30);
            ctx.fillStyle = "#ff69b4";
            ctx.fillText("Нажми МЫШКОЙ или ПРОБЕЛ для рестарта", canvas.width / 2, canvas.height / 2 + 80);
        }

        requestAnimationFrame(loop);
    }
})();
</script>
</body>
</html>
