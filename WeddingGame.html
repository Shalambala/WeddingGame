<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Wedding Run Final Fix</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-image: url('https://i.ibb.co/R40qMKdn/bride-png.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-color: #87CEEB;
            font-family: sans-serif;
        }
        canvas { display: block; }
        #ui { 
            position: fixed; top: 20px; left: 20px; color: white; 
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10;
        }
        #start { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">Монеты: <span id="c">0</span> | Дистанция: <span id="d">0</span> м</div>

<div id="start">
    <h1 style="color: #ff69b4; font-size: 40px; margin: 0;">👰 СВАДЕБНЫЙ ЗАБЕГ</h1>
    <p>Нажми СЮДА для старта</p>
</div>

<canvas id="g"></canvas>

<script>
(function() {
    const canvas = document.getElementById("g");
    const ctx = canvas.getContext("2d");
    const startDiv = document.getElementById("start");
    
    let active = false;
    let over = false;
    let coins = 0;
    let dist = 0;
    let ground, speed = 7;
    let obs = [], cl = [];

    // Загрузка изображения препятствия
    const obstacleImg = new Image();
    // ВАЖНО: Используем прямую ссылку на изображение (i.ibb.co)
    obstacleImg.src = 'https://i.ibb.co/bc36vHv/image.png'; 

    const p = { x: 80, y: 0, w: 50, h: 70, dy: 0, canJump: false };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ground = canvas.height - 60;
        p.y = ground - p.h;
    }

    startDiv.addEventListener("click", function() {
        if (!active) {
            active = true;
            startDiv.style.display = "none";
            loop();
        }
    });

    window.addEventListener("mousedown", function() {
        if (!active) return;
        if (over) { location.reload(); return; }
        if (p.canJump) {
            p.dy = -18;
            p.canJump = false;
        }
    });

    window.addEventListener("resize", resize);
    resize();

    setInterval(() => {
        if (!active || over) return;
        // Увеличим высоту препятствия под картинку
        obs.push({ x: canvas.width, w: 50, h: 60 });
        if (Math.random() > 0.5) cl.push({ x: canvas.width + 100, y: ground - 120, r: 10 });
    }, 1500);

    function loop() {
        if (over) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Розовый пол
        ctx.fillStyle = "rgba(255, 105, 180, 0.7)";
        ctx.fillRect(0, ground, canvas.width, 10);

        // Гравитация
        p.dy += 0.8;
        p.y += p.dy;
        if (p.y > ground - p.h) {
            p.y = ground - p.h;
            p.dy = 0;
            p.canJump = true;
        }

        // Невеста
        ctx.fillStyle = "#ff69b4";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
        ctx.fillRect(p.x - 15, p.y + 10, 15, 40);

        // Препятствия (Картинка)
        obs.forEach((o, i) => {
            o.x -= speed;
            if (obstacleImg.complete) {
                ctx.drawImage(obstacleImg, o.x, ground - o.h, o.w, o.h);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(o.x, ground - o.h, o.w, o.h);
            }
            
            if (p.x < o.x + o.w && p.x + p.w > o.x && p.y + p.h > ground - o.h) over = true;
        });

        // Монетки
        ctx.fillStyle = "#FFD700";
        cl.forEach((c, i) => {
            c.x -= speed;
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill();
            let dx = (p.x + p.w/2) - c.x;
            let dy = (p.y + p.h/2) - c.y;
            if (Math.sqrt(dx*dx + dy*dy) < 40) {
                coins++;
                cl.splice(i, 1);
            }
        });

        dist += speed * 0.01;
        document.getElementById("c").innerText = coins;
        document.getElementById("d").innerText = Math.floor(dist);

        if (over) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "30px Arial";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2);
            ctx.fillText("Нажми для рестарта", canvas.width / 2, canvas.height / 2 + 50);
        }

        speed += 0.001;
        requestAnimationFrame(loop);
    }
})();
</script>
</body>
</html>
